name: tests

on:
  push:
  pull_request:

# Variables de entorno compartidas para todos los pasos que usan la DB/app
env:
  DB_USER: test
  DB_PASSWORD: test
  DB_HOST: 127.0.0.1
  DB_NAME: test_db
  DB_PORT: 3306
  TEST_MODE: "1"
  AUTH_SECRET_KEY: test_secret_key_for_ci_only_32_chars_minimum
  REDIS_PASSWORD: ci_redis_password_placeholder

jobs:
  pytest:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: ci_root_password
          MYSQL_DATABASE: test_db
          MYSQL_USER: test
          MYSQL_PASSWORD: test
        options: >-
          --health-cmd="mysqladmin ping -h localhost -u root --password=ci_root_password"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
        ports:
          - 3306:3306

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      # SHA fijo: garantiza que CI y local usan exactamente la misma versión.
      # Para actualizar: cambiar el SHA al nuevo commit de tuwayki-core después de pushear.
      - name: Install tuwayki-core
        run: |
          python -m pip install \
            git+https://github.com/TreborOscorima/tuwayki-core.git@ef1c30e33ac9aed6c1a8507de2a31382dedd69ec

      # Falla rápido y con mensaje claro si se agrega una función en tuwayki-core local
      # sin commitearla al repo público. Actualizar este listado al ampliar la API.
      - name: Verificar API pública de tuwayki-core
        run: |
          python -c "
          from tuwayki_core.countries import (
              SUPPORTED_COUNTRIES, CURRENCY_CATALOG,
              get_country_config, get_country_config_by_currency,
              get_payment_methods_for_country, is_reserved_payment_method,
              UNIVERSAL_PAYMENT_METHODS, COUNTRY_PAYMENT_METHODS,
              LEGACY_PAYMENT_METHOD_IDS, RESERVED_PAYMENT_METHOD_NAME_KEYS,
          )
          from tuwayki_core.enums import PaymentMethodType
          from tuwayki_core.utils.formatting import format_currency, round_currency
          from tuwayki_core.utils.crypto import CertMetadata
          from tuwayki_core.utils.calculations import _to_decimal
          from tuwayki_core.utils.tenant import _refresh_tenant_models
          from tuwayki_core.utils.tax_presets import TaxRatePreset
          print('tuwayki-core API OK')
          "

      - name: Install dependencies
        run: python -m pip install -r requirements-dev.txt

      - name: Validate dependency graph
        run: python -m pip check

      - name: Compile source
        run: python -m compileall -q app scripts

      - name: Run tests
        run: |
          set -o pipefail
          python -m pytest -q \
            --cov=app --cov-report=term-missing --cov-fail-under=34 \
            --ignore=tests/test_e2e.py \
            2>&1 | tee pytest-output.txt

      - name: Upload test output on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-output
          path: pytest-output.txt

      - name: Show output on failure
        if: failure()
        run: |
          echo "### pytest output" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          cat pytest-output.txt >> $GITHUB_STEP_SUMMARY 2>/dev/null \
            || echo "(sin output)" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          cat pytest-output.txt || true
