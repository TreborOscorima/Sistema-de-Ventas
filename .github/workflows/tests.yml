name: tests

on:
  push:
  pull_request:

jobs:
  pytest:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: ci_root_password
          MYSQL_DATABASE: test_db
          MYSQL_USER: test
          MYSQL_PASSWORD: test
        options: >-
          --health-cmd="mysqladmin ping -h localhost -u root --password=ci_root_password"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
        ports:
          - 3306:3306

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install tuwayki-core
        run: python -m pip install git+https://github.com/TreborOscorima/tuwayki-core.git
      - name: Install dependencies
        run: python -m pip install -r requirements-dev.txt
      - name: Validate dependency graph
        run: python -m pip check
      - name: Compile source
        run: python -m compileall -q app scripts
      - name: Diagnóstico de importación de módulos
        env:
          DB_USER: test
          DB_PASSWORD: test
          DB_HOST: 127.0.0.1
          DB_NAME: test_db
          DB_PORT: 3306
          TEST_MODE: "1"
          AUTH_SECRET_KEY: test_secret_key_for_ci_only_32_chars_minimum
          REDIS_PASSWORD: ci_redis_password_placeholder
        run: |
          python3 -c "
          import sys
          sys.path.insert(0, '.')
          mods = [
              'app.utils.formatting',
              'app.states.types',
              'app.states.cash._petty_cash_mixin',
              'app.states.cash',
              'app.states.services_state',
              'app.states.root_state',
              'app.state',
          ]
          for m in mods:
              try:
                  __import__(m)
                  print(f'OK: {m}')
                  sys.stdout.flush()
              except Exception as e:
                  print(f'FAIL: {m}: {type(e).__name__}: {e}', file=sys.stderr)
                  import traceback
                  traceback.print_exc(file=sys.stderr)
                  sys.exit(1)
          print('All imports OK')
          "
      - name: Check test collection (diagnóstico)
        env:
          DB_USER: test
          DB_PASSWORD: test
          DB_HOST: 127.0.0.1
          DB_NAME: test_db
          DB_PORT: 3306
          TEST_MODE: "1"
          AUTH_SECRET_KEY: test_secret_key_for_ci_only_32_chars_minimum
          REDIS_PASSWORD: ci_redis_password_placeholder
        run: |
          set -o pipefail
          python -m pytest --collect-only -q --ignore=tests/test_e2e.py \
            2>&1 | tee collection-output.txt
      - name: Upload collection output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: collection-output
          path: collection-output.txt
      - name: Run tests (sin cobertura — aislar fallos)
        env:
          DB_USER: test
          DB_PASSWORD: test
          DB_HOST: 127.0.0.1
          DB_NAME: test_db
          DB_PORT: 3306
          TEST_MODE: "1"
          AUTH_SECRET_KEY: test_secret_key_for_ci_only_32_chars_minimum
          REDIS_PASSWORD: ci_redis_password_placeholder
        run: |
          set -o pipefail
          python -m pytest --no-cov -x --tb=long --ignore=tests/test_e2e.py \
            -v 2>&1 | tee pytest-output.txt

      - name: Run tests with coverage
        env:
          DB_USER: test
          DB_PASSWORD: test
          DB_HOST: 127.0.0.1
          DB_NAME: test_db
          DB_PORT: 3306
          TEST_MODE: "1"
          AUTH_SECRET_KEY: test_secret_key_for_ci_only_32_chars_minimum
          REDIS_PASSWORD: ci_redis_password_placeholder
        # cov-fail-under refleja cobertura actual (~35%) — subir gradualmente al agregar tests.
        run: |
          python -m pytest -q --cov=app --cov-report=term-missing \
            --cov-fail-under=34 --ignore=tests/test_e2e.py 2>&1 | tee pytest-output.txt
          exit ${PIPESTATUS[0]}

      - name: Show pytest output on failure
        if: failure()
        run: |
          echo "### Collection output" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          cat collection-output.txt >> $GITHUB_STEP_SUMMARY 2>&1 || echo "(no collection-output.txt)" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "### Test output" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          cat pytest-output.txt >> $GITHUB_STEP_SUMMARY 2>&1 || echo "(no pytest-output.txt)" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "=== COLLECTION OUTPUT ===" && cat collection-output.txt || true
          echo "=== TEST OUTPUT ===" && cat pytest-output.txt || true
      - name: Publish collection output via API
        if: failure()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -f collection-output.txt ]; then
            CONTENT=$(base64 -w 0 < collection-output.txt)
            # Get current file SHA if it exists
            SHA=$(curl -s -H "Authorization: token $GITHUB_TOKEN" \
              "https://api.github.com/repos/${{ github.repository }}/contents/ci-debug-output.txt" \
              | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('sha',''))" 2>/dev/null || echo "")
            BODY="{\"message\":\"ci: debug collection output [skip ci]\",\"content\":\"$CONTENT\",\"branch\":\"main\"}"
            if [ -n "$SHA" ]; then
              BODY="{\"message\":\"ci: debug collection output [skip ci]\",\"content\":\"$CONTENT\",\"sha\":\"$SHA\",\"branch\":\"main\"}"
            fi
            curl -s -X PUT \
              -H "Authorization: token $GITHUB_TOKEN" \
              -H "Content-Type: application/json" \
              "https://api.github.com/repos/${{ github.repository }}/contents/ci-debug-output.txt" \
              -d "$BODY" | python3 -c "import sys,json; d=json.load(sys.stdin); print('Committed:', d.get('commit',{}).get('sha','ERROR'))"
          fi

      - name: Upload pytest output on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-output
          path: pytest-output.txt
