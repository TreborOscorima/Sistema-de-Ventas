name: tests

on:
  push:
  pull_request:

jobs:
  pytest:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: ci_root_password
          MYSQL_DATABASE: test_db
          MYSQL_USER: test
          MYSQL_PASSWORD: test
        options: >-
          --health-cmd="mysqladmin ping -h localhost -u root --password=ci_root_password"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
        ports:
          - 3306:3306

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install tuwayki-core
        run: python -m pip install git+https://github.com/TreborOscorima/tuwayki-core.git
      - name: Install dependencies
        run: python -m pip install -r requirements-dev.txt
      - name: Validate dependency graph
        run: python -m pip check
      - name: Compile source
        run: python -m compileall -q app scripts
      - name: Run tests with coverage
        env:
          DB_USER: test
          DB_PASSWORD: test
          DB_HOST: 127.0.0.1
          DB_NAME: test_db
          DB_PORT: 3306
          TEST_MODE: "1"
          AUTH_SECRET_KEY: test_secret_key_for_ci_only_32_chars_minimum
          REDIS_PASSWORD: ci_redis_password_placeholder
        # Los tests E2E requieren un servidor Reflex en ejecución y navegadores Playwright.
        # Se excluyen del CI unitario; se ejecutan localmente o en un job dedicado.
        # cov-fail-under refleja cobertura actual (~35%) — subir gradualmente al agregar tests.
        run: python -m pytest -q --tb=short --cov=app --cov-report=term-missing --cov-fail-under=34 --ignore=tests/test_e2e.py
