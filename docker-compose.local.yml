# =============================================================================
# docker-compose.local.yml — Override para testing local (Windows/Mac)
#
# Uso:
#   docker compose -f docker-compose.yml -f docker-compose.local.yml up -d
#
# Acceso desde el navegador:
#   Landing : http://localhost:3000
#   Sistema : http://localhost:3001
#   Admin   : http://localhost:3002
#
# Lo que hace este override:
#   - Reemplaza npm_network (external) → bridge local (sin Nginx Proxy Manager)
#   - Expone el puerto 3000 de cada contenedor en un puerto distinto del host
#   - Establece PUBLIC_API_URL a localhost:PORT (bakeado en el frontend compilado)
#   - Activa ALLOW_MEMORY_RATE_LIMIT_FALLBACK para poder omitir Redis local
#
# Mínimo en .env para este override:
#   DB_PASSWORD, AUTH_SECRET_KEY, MYSQL_ROOT_PASSWORD
# =============================================================================

services:
  mysql:
    ports:
      - "33306:3306"

  tuwayki_landing:
    ports:
      - "3000:3000"
    environment:
      PUBLIC_API_URL: "http://localhost:3000"
      PUBLIC_SITE_URL: "http://localhost:3000"
      PUBLIC_APP_URL: "http://localhost:3001"
      PUBLIC_OWNER_URL: "http://localhost:3002"
      ALLOW_MEMORY_RATE_LIMIT_FALLBACK: "1"
      # Anular valores del .env local que romperían Docker:
      DB_HOST: tuwayki_mysql
      ENV: prod

  tuwayki_sys:
    ports:
      - "3001:3000"
    environment:
      PUBLIC_API_URL: "http://localhost:3001"
      PUBLIC_SITE_URL: "http://localhost:3000"
      PUBLIC_APP_URL: "http://localhost:3001"
      PUBLIC_OWNER_URL: "http://localhost:3002"
      ALLOW_MEMORY_RATE_LIMIT_FALLBACK: "1"
      DB_HOST: tuwayki_mysql
      ENV: prod

  tuwayki_admin:
    ports:
      - "3002:3000"
    environment:
      PUBLIC_API_URL: "http://localhost:3002"
      PUBLIC_SITE_URL: "http://localhost:3000"
      PUBLIC_APP_URL: "http://localhost:3001"
      PUBLIC_OWNER_URL: "http://localhost:3002"
      ALLOW_MEMORY_RATE_LIMIT_FALLBACK: "1"
      DB_HOST: tuwayki_mysql
      ENV: prod

networks:
  # Override: bridge local en lugar de external (no requiere NPM instalado).
  # external: false es obligatorio para sobreescribir el "external: true" del compose base.
  npm_network:
    external: false
    driver: bridge
    name: tuwayki_local_npm
