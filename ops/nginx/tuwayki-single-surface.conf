# Emergency fallback: single stable surface (APP_SURFACE=all).
# Keep everything operational while finishing domain split safely.
#
# Behavior:
# - https://tuwayki.app/            -> Sistema principal (incluye login y modulos)
# - https://tuwayki.app/home        -> Landing publica (modo compatibilidad)
# - https://tuwayki.app/owner/login -> Gestion de plataforma
# - https://sys.tuwayki.app/*       -> 302 a https://tuwayki.app/*
# - https://admin.tuwayki.app/login -> 302 a https://tuwayki.app/owner/login
#
# Place in: /etc/nginx/conf.d/tuwayki-single-surface.conf
# Activate with:
#   sudo nginx -t && sudo systemctl reload nginx

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

upstream tuwayki_all {
    server 127.0.0.1:3200;
    keepalive 64;
}

server {
    listen 80;
    listen [::]:80;
    server_name tuwayki.app www.tuwayki.app sys.tuwayki.app admin.tuwayki.app;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.tuwayki.app;

    ssl_certificate     /etc/letsencrypt/live/tuwayki.app/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/tuwayki.app/privkey.pem;

    return 301 https://tuwayki.app$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name tuwayki.app;

    ssl_certificate     /etc/letsencrypt/live/tuwayki.app/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/tuwayki.app/privkey.pem;

    server_tokens off;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 5;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml
        font/woff
        font/woff2;

    location ~* \.(?:css|js|mjs|json|png|jpe?g|gif|webp|svg|ico|woff2?)$ {
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable" always;
        proxy_pass http://tuwayki_all;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_read_timeout 86400;
        proxy_send_timeout 86400;
    }

    location / {
        proxy_pass http://tuwayki_all;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_read_timeout 86400;
        proxy_send_timeout 86400;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name sys.tuwayki.app;

    ssl_certificate     /etc/letsencrypt/live/tuwayki.app/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/tuwayki.app/privkey.pem;

    return 302 https://tuwayki.app$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name admin.tuwayki.app;

    ssl_certificate     /etc/letsencrypt/live/tuwayki.app/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/tuwayki.app/privkey.pem;

    location = /login {
        return 302 https://tuwayki.app/owner/login;
    }

    location = / {
        return 302 https://tuwayki.app/owner;
    }

    location / {
        return 302 https://tuwayki.app/owner/login;
    }
}
