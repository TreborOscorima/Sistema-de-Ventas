# Nginx/OpenResty host-based split for TUWAYKI monorepo.
# Final URLs:
# - https://tuwayki.app/          -> Landing (APP_SURFACE=landing, port 3100)
# - https://sys.tuwayki.app/      -> Sales App (APP_SURFACE=app, port 3200)
# - https://admin.tuwayki.app/    -> Owner/Admin (APP_SURFACE=owner, port 3300)
#
# Place in: /etc/nginx/conf.d/tuwayki-domain-split.conf
# Reload with: sudo nginx -t && sudo systemctl reload nginx
#
# CACHE STRATEGY
# - /_next/static/** : immutable 365d (Next.js content-hashes every filename)
# - images/fonts     : public 1d (no immutable — not content-hashed)
# - HTML / all else  : no-store (always fresh; fixes Chrome stale-cache bug)
#
# SECURITY HEADERS NOTE
# nginx does NOT inherit add_header from parent scope when a child location
# defines its own add_header.  Headers are repeated in every proxy location.

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# Rate limiting zones (defined in http context via conf.d include).
# login_zone : 10 req/min per IP — anti-brute-force en /ingreso.
# api_zone   : 60 req/min per IP — protección general de endpoints API.
limit_req_zone $binary_remote_addr zone=login_zone:10m rate=10r/m;
limit_req_zone $binary_remote_addr zone=api_zone:10m rate=60r/m;

upstream tuwayki_landing {
    server 127.0.0.1:3100;
    keepalive 64;
}

upstream tuwayki_app {
    server 127.0.0.1:3200;
    keepalive 64;
}

upstream tuwayki_owner {
    server 127.0.0.1:3300;
    keepalive 64;
}

server {
    listen 80;
    listen [::]:80;
    server_name tuwayki.app www.tuwayki.app sys.tuwayki.app admin.tuwayki.app;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.tuwayki.app;

    ssl_certificate     /etc/letsencrypt/live/tuwayki.app/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/tuwayki.app/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers off;

    return 301 https://tuwayki.app$request_uri;
}

# ── tuwayki.app — Landing ────────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name tuwayki.app;

    ssl_certificate     /etc/letsencrypt/live/tuwayki.app/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/tuwayki.app/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers off;
    client_max_body_size 10M;

    server_tokens off;

    # Security headers at server scope apply only to locations that do NOT
    # define their own add_header (i.e. the redirect locations below).
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://www.googletagmanager.com https://connect.facebook.net; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https://www.googletagmanager.com https://www.facebook.com; connect-src 'self' https://www.google-analytics.com https://analytics.google.com https://www.googletagmanager.com https://www.facebook.com; frame-src 'none'; object-src 'none'; base-uri 'self'; form-action 'self' https://wa.me;" always;

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 5;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml
        font/woff
        font/woff2;

    # Compat redirects (30 days) — inherit security headers from server scope.
    location = /home {
        return 301 https://tuwayki.app/;
    }
    location = /owner {
        return 301 https://admin.tuwayki.app/;
    }
    location = /owner/login {
        return 301 https://admin.tuwayki.app/login;
    }
    location ~* ^/(ingreso|dashboard|compras|venta|caja|clientes|cuentas|inventario|historial|reportes|servicios|configuracion|registro|cambiar-clave|periodo-prueba-finalizado|cuenta-suspendida)(/.*)?$ {
        return 301 https://sys.tuwayki.app$request_uri;
    }

    # Next.js content-hashed static assets — safe to cache immutably because
    # every file name already contains a content hash or build ID.
    location ~* ^/_next/static/ {
        expires 365d;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        proxy_pass http://tuwayki_landing;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_read_timeout 86400;
        proxy_send_timeout 86400;
    }

    # Other static files (images, fonts) — 1 day, NOT immutable.
    location ~* \.(?:png|jpe?g|gif|webp|svg|ico|woff2?)$ {
        expires 1d;
        add_header Cache-Control "public, max-age=86400" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        proxy_pass http://tuwayki_landing;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_read_timeout 86400;
        proxy_send_timeout 86400;
    }

    # HTML pages and all other requests — never cache.
    # Chrome was serving a stale version on first load; this forces a fresh fetch.
    location / {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma "no-cache" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://www.googletagmanager.com https://connect.facebook.net; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https://www.googletagmanager.com https://www.facebook.com; connect-src 'self' https://www.google-analytics.com https://analytics.google.com https://www.googletagmanager.com https://www.facebook.com; frame-src 'none'; object-src 'none'; base-uri 'self'; form-action 'self' https://wa.me;" always;
        proxy_pass http://tuwayki_landing;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_read_timeout 86400;
        proxy_send_timeout 86400;
    }
}

