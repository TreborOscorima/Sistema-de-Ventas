[pytest]
asyncio_mode = auto

# Python 3.13 + unittest.mock.AsyncMock GC regression:
# AsyncMock objects from previously-run test classes are garbage-collected
# while subsequent tests run, triggering PytestUnraisableExceptionWarning.
# This is a known framework issue, not application code.
filterwarnings =
    ignore::pytest.PytestUnraisableExceptionWarning
    ignore:coroutine 'AsyncMockMixin._execute_mock_call' was never awaited:RuntimeWarning
